<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Traffic Light System</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="glow-blob a"></div>
  <div class="glow-blob b"></div>

  <div class="scene">
    <div class="label">Traffic Control Unit</div>

    <div class="housing">
      <div class="lights-wrap">
        <div class="light-slot" id="slot-red">   <div class="core"></div></div>
        <div class="light-slot" id="slot-yellow"><div class="core"></div></div>
        <div class="light-slot" id="slot-green"> <div class="core"></div></div>
      </div>
    </div>

    <div class="pole"></div>
    <div class="base"></div>

    <div class="info-panel">
      <div class="status-row">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-label" id="status-label">—</div>
      </div>

      <div class="timer-wrap">
        <div class="timer-row">
          <span class="timer-tag">Time Remaining</span>
          <span class="timer-value" id="timer-value">—</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <!-- Manual Control Buttons -->
      <div class="controls">
        <span class="controls-label">Manual Override</span>
        <div class="btn-row">
          <button class="btn btn-red"    onclick="manualActivate(0)">RED</button>
          <button class="btn btn-yellow" onclick="manualActivate(2)">YELLOW</button>
          <button class="btn btn-green"  onclick="manualActivate(1)">GREEN</button>
        </div>
        <button class="btn btn-auto" id="auto-btn" onclick="toggleAuto()">⟳ AUTO</button>
      </div>
    </div>

    <div class="sig">Signal Management System v2.0</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
